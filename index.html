<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Meter Helper</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; padding:15px;}
.card { background:#fff; padding:15px; border-radius:12px; margin-bottom:15px;}
input { width:100%; padding:12px; margin-top:5px; margin-bottom:10px;}
button { padding:12px; width:100%; background:black; color:white; border:none; border-radius:8px;}
.entry { border:1px solid #ddd; padding:10px; margin-top:10px; border-radius:10px;}
</style>
</head>

<body>

<div class="card">
<h2>Enter Meter Reading</h2>

Previous Reading:
<input id="prev" type="number">

Current Reading:
<input id="curr" type="number">

Meter Read Date:
<input id="readDate" type="date">

Bill Period Start:
<input id="billFrom" type="date">

Bill Period End:
<input id="billTo" type="date">

<button onclick="calculateAndSave()">Save</button>
</div>

<div class="card">
<h2>Result</h2>
Usage: <b id="usage">0</b> kWh<br><br>
Estimated Bill: <b id="bill">$0</b>
</div>

<div class="card">
<h2>History</h2>
<div id="history"></div>
</div>

<script>

const SUPABASE_URL = "https://zdhvnoiayjupgwnjrbkg.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkaHZub2lheWp1cGd3bmpyYmtnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MDk3MjIsImV4cCI6MjA5MTQ4NTcyMn0.9iBjicqdI_SzaZkUtFjCVYJ8wPEI2eacEiAnuqcgkqE";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// your rates
const energy = 0.07253;
const tdsp = 0.0665;
const puca = 0.00023;

async function calculateAndSave(){

let prev = parseFloat(document.getElementById("prev").value);
let curr = parseFloat(document.getElementById("curr").value);

let readDate = document.getElementById("readDate").value;
let billFrom = document.getElementById("billFrom").value;
let billTo = document.getElementById("billTo").value;

if(!prev || !curr){
alert("Enter readings");
return;
}

let usage = curr - prev;
let bill = usage * (energy + tdsp + puca);

document.getElementById("usage").innerText = usage.toFixed(2);
document.getElementById("bill").innerText = "$" + bill.toFixed(2);

// save to supabase
await supabase.from("meter_history").insert({
previous_reading: prev,
current_reading: curr,
usage: usage,
estimated_bill: bill,
read_date: readDate,
bill_from: billFrom,
bill_to: billTo
});

loadHistory();

// auto update prev
document.getElementById("prev").value = curr;
document.getElementById("curr").value = "";
}

async function loadHistory(){

let { data } = await supabase
.from("meter_history")
.select("*")
.order("created_at", { ascending:false });

let html = "";

data.forEach(item => {
html += `
<div class="entry">
<b>${new Date(item.created_at).toLocaleString()}</b><br>
Usage: ${item.usage.toFixed(2)} kWh<br>
Bill: $${item.estimated_bill.toFixed(2)}<br>
Read Date: ${item.read_date || "-"}<br>
Bill Period: ${item.bill_from || "-"} → ${item.bill_to || "-"}
</div>
`;
});

document.getElementById("history").innerHTML = html || "No data";
}

loadHistory();

</script>

</body>
</html>
