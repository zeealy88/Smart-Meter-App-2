<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Meter App</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
      margin: 0;
    }
    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }
    label {
      display: block;
      margin: 10px 0 4px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 10px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      background: black;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .entry {
      padding: 10px 0;
      border-bottom: 1px solid #ddd;
    }
    .status {
      margin-top: 10px;
      color: #555;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Smart Meter App</h2>

    <label for="prev">Previous Reading</label>
    <input id="prev" type="number" step="0.001" placeholder="Previous Reading" />

    <label for="curr">Current Reading</label>
    <input id="curr" type="number" step="0.001" placeholder="Current Reading" />

    <button id="saveBtn" type="button">Save</button>
    <div id="status" class="status">Ready.</div>
  </div>

  <div class="card">
    <h3>Result</h3>
    Usage: <span id="usage">0</span><br>
    Bill: <span id="bill">$0</span>
  </div>

  <div class="card">
    <h3>History</h3>
    <div id="history">Loading...</div>
  </div>

 <script>
  const rate = 0.13926;

  const supabase = window.supabase.createClient(
    "https://zdhvnoiyayjupgwnjrbkg.supabase.co",
    "sb_publishable_ut0vWantp9acwz4Gov8PNA_TonMYYFW"
  );

  async function saveData() {
    try {
      const prev = parseFloat(document.getElementById("prev").value);
      const curr = parseFloat(document.getElementById("curr").value);

      if (isNaN(prev) || isNaN(curr)) {
        alert("Enter both readings");
        return;
      }

      if (curr <= prev) {
        alert("Current reading must be greater than previous reading");
        return;
      }

      const usage = curr - prev;
      const bill = usage * rate;

      document.getElementById("usage").innerText = usage.toFixed(2);
      document.getElementById("bill").innerText = "$" + bill.toFixed(2);
      document.getElementById("status").innerText = "Saving...";

      const payload = {
        previous_reading: prev,
        current_reading: curr,
        usage: usage,
        estimated_bill: bill
      };

      console.log("Saving payload:", payload);

      const { data, error } = await supabase
        .from("meter_history")
        .insert([payload])
        .select();

      console.log("Insert result:", { data, error });

      if (error) {
        alert("Save failed: " + error.message);
        document.getElementById("status").innerText = "Save failed: " + error.message;
        return;
      }

      document.getElementById("status").innerText = "Saved successfully";
      await loadHistory();
    } catch (e) {
      console.error(e);
      alert("Unexpected error: " + e.message);
      document.getElementById("status").innerText = "Unexpected error";
    }
  }

  async function loadHistory() {
    try {
      document.getElementById("status").innerText = "Loading history...";

      const { data, error } = await supabase
        .from("meter_history")
        .select("*")
        .order("id", { ascending: false });

      console.log("Load result:", { data, error });

      if (error) {
        document.getElementById("history").innerText = "Load error: " + error.message;
        document.getElementById("status").innerText = "Load failed";
        return;
      }

      let html = "";
      data.forEach(item => {
        html += `
          <div class="entry">
            Usage: ${Number(item.usage).toFixed(2)} kWh |
            Bill: $${Number(item.estimated_bill).toFixed(2)}
          </div>
        `;
      });

      document.getElementById("history").innerHTML = html || "No data";
      document.getElementById("status").innerText = "Ready.";
    } catch (e) {
      console.error(e);
      document.getElementById("history").innerText = "Unexpected load error";
      document.getElementById("status").innerText = "Load failed";
    }
  }

  document.querySelector("button").addEventListener("click", saveData);

  loadHistory();
</script>

</body>
</html>
