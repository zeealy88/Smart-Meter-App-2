<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Meter App</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
      margin: 0;
    }
    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }
    label {
      display: block;
      margin: 10px 0 4px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 10px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      background: black;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .entry {
      padding: 10px 0;
      border-bottom: 1px solid #ddd;
    }
    #status {
      margin-top: 10px;
      font-size: 14px;
      color: #444;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Enter Meter Reading</h2>

    <label for="prev">Previous Reading</label>
    <input id="prev" type="number" step="0.001" placeholder="Previous Reading" />

    <label for="curr">Current Reading</label>
    <input id="curr" type="number" step="0.001" placeholder="Current Reading" />

    <label for="readDate">Meter Read Date</label>
    <input id="readDate" type="date" />

    <label for="billFrom">Bill Period Start</label>
    <input id="billFrom" type="date" />

    <label for="billTo">Bill Period End</label>
    <input id="billTo" type="date" />

    <button id="saveBtn" type="button">Save</button>
    <div id="status">Starting...</div>
  </div>

  <div class="card">
    <h3>Result</h3>
    Usage: <span id="usage">0</span><br />
    Bill: <span id="bill">$0</span>
  </div>

  <div class="card">
    <h3>History</h3>
    <div id="history">Loading...</div>
  </div>

  <script>
    const SUPABASE_URL = "https://zdhvnoiayjupgwnjrbkg.supabase.co";
    const SUPABASE_KEY = "sb_publishable_ut0vWantp9acwz4Gov8PNA_TonMYYFW";
    const RATE = 0.13926;

    let supabaseClient = null;

    function setStatus(msg) {
      document.getElementById("status").innerText = msg;
      console.log(msg);
    }

    function calculate() {
      const prev = parseFloat(document.getElementById("prev").value);
      const curr = parseFloat(document.getElementById("curr").value);

      if (isNaN(prev) || isNaN(curr)) {
        throw new Error("Enter both readings.");
      }

      if (curr <= prev) {
        throw new Error("Current reading must be greater than previous reading.");
      }

      const usage = curr - prev;
      const bill = usage * RATE;

      document.getElementById("usage").innerText = usage.toFixed(2);
      document.getElementById("bill").innerText = "$" + bill.toFixed(2);

      return {
        previous_reading: prev,
        current_reading: curr,
        usage: usage,
        estimated_bill: bill,
        read_date: document.getElementById("readDate").value || null,
        bill_from: document.getElementById("billFrom").value || null,
        bill_to: document.getElementById("billTo").value || null
      };
    }

    async function saveData() {
  try {
    setStatus("Button clicked.");
    const payload = calculate();
    setStatus("Calculated. Saving...");

    if (!supabaseClient) {
      throw new Error("Supabase not initialized.");
    }

    const { error } = await supabaseClient
      .from("meter_history")
      .insert([payload]);

    if (error) throw error;

    document.getElementById("prev").value = payload.current_reading;
    document.getElementById("curr").value = "";

    setStatus("Saved successfully.");
    await loadHistory();
  } catch (err) {
    alert(err.message);
    setStatus("Save failed: " + err.message);
    console.error(err);
  }
}

      try {
        setStatus("Loading history...");
        const { data, error } = await supabaseClient
          .from("meter_history")
          .select("*")
          .order("id", { ascending: false });

        if (error) throw error;

        let html = "";
        (data || []).forEach(item => {
          html += `
            <div class="entry">
              Usage: ${Number(item.usage).toFixed(2)} kWh |
              Bill: $${Number(item.estimated_bill).toFixed(2)}<br>
              Read Date: ${item.read_date || "-"}<br>
              Bill Period: ${item.bill_from || "-"} → ${item.bill_to || "-"}
            </div>
          `;
        });

        document.getElementById("history").innerHTML = html || "No data";
        setStatus("Ready.");
      } catch (err) {
        document.getElementById("history").innerText = "Load failed: " + err.message;
        setStatus("Load failed: " + err.message);
      }
    }

    async function saveData() {
  try {
    setStatus("Button clicked.");
    const payload = calculate();
    setStatus("Calculated. Saving...");

    if (!supabaseClient) {
      throw new Error("Supabase not initialized.");
    }

    const { error } = await supabaseClient
      .from("meter_history")
      .insert([payload]);

    if (error) throw error;

    document.getElementById("prev").value = payload.current_reading;
    document.getElementById("curr").value = "";

    setStatus("Saved successfully.");
    await loadHistory();
  } catch (err) {
    alert(err.message);
    setStatus("Save failed: " + err.message);
    console.error(err);
  }
}
    document.addEventListener("DOMContentLoaded", async () => {
      setStatus("Page loaded.");
      document.getElementById("saveBtn").addEventListener("click", saveData);
      await initSupabase();
      await loadHistory();
    });
  </script>
</body>
</html>
