<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Meter Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
      margin: 0;
    }
    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }
    label {
      display: block;
      margin-top: 10px;
      margin-bottom: 4px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 10px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      background: black;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .status {
      margin-top: 10px;
      color: #555;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Smart Meter Test</h2>

    <label for="prev">Previous Reading</label>
    <input id="prev" type="number" step="0.001" placeholder="Previous Reading">

    <label for="curr">Current Reading</label>
    <input id="curr" type="number" step="0.001" placeholder="Current Reading">

    <button id="calcBtn">Calculate</button>
    <div id="status" class="status">Page loaded.</div>
  </div>

  <div class="card">
    <h3>Result</h3>
    Usage: <span id="usage">0</span><br>
    Bill: <span id="bill">$0</span>
  </div>

  <script>
    const rate = 0.13926;

    document.getElementById("calcBtn").addEventListener("click", function () {
      const prev = parseFloat(document.getElementById("prev").value);
      const curr = parseFloat(document.getElementById("curr").value);

      if (isNaN(prev) || isNaN(curr)) {
        alert("Enter both readings");
        return;
      }

      if (curr <= prev) {
        alert("Current reading must be greater than previous reading");
        return;
      }

      const usage = curr - prev;
      const bill = usage * rate;

      document.getElementById("usage").innerText = usage.toFixed(2);
      document.getElementById("bill").innerText = "$" + bill.toFixed(2);
      document.getElementById("status").innerText = "Calculation works.";
    });
  </script>
</body>
</html>
