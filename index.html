<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Meter Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
      margin: 0;
    }
    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }
    label {
      display: block;
      margin-top: 10px;
      margin-bottom: 4px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 10px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      background: black;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .status {
      margin-top: 10px;
      color: #555;
      font-size: 14px;
    }
    .entry {
      padding: 10px 0;
      border-bottom: 1px solid #ddd;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Smart Meter Test</h2>

    <label for="prev">Previous Reading</label>
    <input id="prev" type="number" step="0.001" placeholder="Previous Reading">

    <label for="curr">Current Reading</label>
    <input id="curr" type="number" step="0.001" placeholder="Current Reading">

    <button id="calcBtn">Calculate + Save</button>
    <div id="status" class="status">Page loaded.</div>
  </div>

  <div class="card">
    <h3>Result</h3>
    Usage: <span id="usage">0</span><br>
    Bill: <span id="bill">$0</span>
  </div>

  <div class="card">
    <h3>History</h3>
    <div id="history">Loading...</div>
  </div>

  <script>
  const rate = 0.13926;

  const supabase = window.supabase.createClient(
    "https://zdhvnoiyayjupgwnjrbkg.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkaHZub2lheWp1cGd3bmpyYmtnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MDk3MjIsImV4cCI6MjA5MTQ4NTcyMn0.9iBjicqdI_SzaZkUtFjCVYJ8wPEI2eacEiAnuqcgkqE"
  );

  async function saveData() {
    const prev = parseFloat(document.getElementById("prev").value);
    const curr = parseFloat(document.getElementById("curr").value);

    if (isNaN(prev) || isNaN(curr)) {
      alert("Enter both readings");
      return;
    }

    if (curr <= prev) {
      alert("Current reading must be greater than previous reading");
      return;
    }

    const usage = curr - prev;
    const bill = usage * rate;

    document.getElementById("usage").innerText = usage.toFixed(2);
    document.getElementById("bill").innerText = "$" + bill.toFixed(2);

    const { error } = await supabase.from("meter_history").insert([{
      previous_reading: prev,
      current_reading: curr,
      usage: usage,
      estimated_bill: bill
    }]);

    if (error) {
      alert("Save failed: " + error.message);
      return;
    }

    alert("Saved successfully");
    loadHistory();
  }

  async function loadHistory() {
    const { data, error } = await supabase
      .from("meter_history")
      .select("*")
      .order("id", { ascending: false });

    if (error) {
      document.getElementById("history").innerText = "Load error: " + error.message;
      return;
    }

    let html = "";
    data.forEach(item => {
      html += `
        <div class="entry">
          Usage: ${Number(item.usage).toFixed(2)} kWh |
          Bill: $${Number(item.estimated_bill).toFixed(2)}
        </div>
      `;
    });

    document.getElementById("history").innerHTML = html || "No data";
  }

  loadHistory();
</script>
</body>
</html>
